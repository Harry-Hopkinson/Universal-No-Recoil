name: CI

on:
    push:
    pull_request:

jobs:
    application:
        runs-on: windows-2025-vs2026
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Build the Project with CMake
              run: |
                  cmake -S . -B build -G "Visual Studio 18 2026" -A x64
                  cmake --build build --config Release --target UNRC

            - name: Strip symbols from executable
              run: strip build/Release/UNRC.exe

            - name: Prepare release folder
              run: |
                  mkdir UniversalNoRecoil
                  copy build\Config.toml UniversalNoRecoil\
                  copy build\Release\UNRC.exe UniversalNoRecoil\

            - name: Upload artifact
              uses: actions/upload-artifact@v6
              with:
                  name: UniversalNoRecoil
                  path: UniversalNoRecoil
